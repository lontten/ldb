name: Benchmark


on:
  push:
  pull_request:

#on:
#  push:
#    branches: [main]
#  pull_request:
#    branches: [main]
#  schedule:
#    - cron: '0 0 * * 0'

jobs:
  benchmark:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 授予写入权限以更新README
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: benchmark_test
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'

      - name: Wait for PostgreSQL
        run: |
          for i in {1..10}; do
            if pg_isready -h localhost -p 5432 -U postgres; then
              echo "PostgreSQL is ready!"
              exit 0
            fi
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          echo "PostgreSQL failed to start"
          exit 1

      - name: Install PostgreSQL client
        run: sudo apt-get install -y postgresql-client

      - name: Initialize database
        env:
          DATABASE_URL: "postgres://postgres:postgres@localhost:5432/benchmark_test?sslmode=disable"
        run: |
          psql $DATABASE_URL -f scripts/init_db.sql

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Run benchmarks
        env:
          DATABASE_URL: "postgres://postgres:postgres@localhost:5432/benchmark_test?sslmode=disable"
        run: |
          set -e
          go test -bench=. -benchmem -benchtime=5s -count=10 -run=^$ ./... 2>&1 | tee benchmark_results.txt
          $HOME/go/bin/benchstat benchmark_results.txt > benchmark_summary.txt
          cat benchmark_summary.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: |
            benchmark_results.txt
            benchmark_summary.txt
          retention-days: 3

      - name: Comment on PR with benchmark results
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            try {
              const summary = fs.readFileSync('benchmark_summary.txt', 'utf8');
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## Benchmark 结果\n\n\`\`\`\n${summary}\n\`\`\``
              });
            } catch (error) {
              console.error('Failed to read benchmark summary:', error);
            }

      # 新增：更新README中的基准测试结果
      - name: Update README with benchmark results
        if: github.event_name == 'push' && github.ref == 'refs/heads/go-test'
        run: |
          # 生成基准测试结果段落（包含时间、环境说明）
          echo "## 最新基准测试结果" > benchmark_section.md
          echo "" >> benchmark_section.md
          echo "测试时间: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> benchmark_section.md
          echo "测试环境: Linux (AMD EPYC 7763 64-Core Processor)" >> benchmark_section.md
          echo "" >> benchmark_section.md
          echo "> 说明：数值越低性能越好，±表示95%置信区间波动范围" >> benchmark_section.md
          echo "" >> benchmark_section.md
          echo "\`\`\`" >> benchmark_section.md
          cat benchmark_summary.txt >> benchmark_section.md
          echo "\`\`\`" >> benchmark_section.md
          
          # 替换README中标记间的内容（保留标记本身）
          # 1. 删除BENCHMARK_RESULTS_START和END之间的内容
          sed -i -e '/<!-- BENCHMARK_RESULTS_START -->/{n; :a; /<!-- BENCHMARK_RESULTS_END -->/!{d; ba};}' README.md
          # 2. 在BENCHMARK_RESULTS_START后插入新内容
          sed -i -e '/<!-- BENCHMARK_RESULTS_START -->/r benchmark_section.md' README.md
          
          # 步骤11：提交并推送更新后的README（仅在推送到go-test分支时执行）
      - name: Commit and push README update
        if: github.event_name == 'push' && github.ref == 'refs/heads/go-test'
        run: |
          # 配置Git用户信息
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          # 添加并提交README更新（无变化则不提交）
          git add README.md
          git commit -m "Update benchmark results in README" || echo "No changes to commit"
          # 推送到go-test分支
          git push origin go-test